version: '3.8'

services:
# Odoo Zerbitzua
  odoo:
    image: odoo:17.0
    depends_on:
      - postgres
    ports:
      - "80:8069"
    environment:
      - HOST=postgres
      - USER=odoo
      - PASSWORD=myodoo
    volumes:
      - odoo_data:/var/lib/odoo
      - ./odoo/addons:/mnt/extra-addons
    networks:
      - app-network
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=myodoo
      - POSTGRES_USER=odoo
    networks:
      - app-network

# ------------------
# Bolumenak eta sareak
# ------------------
volumes:
  mysql_data:
  postgres_data:
  # Odoo fitxategien bolumen berria
  odoo_data: 
  redis_data:

networks:
  app-network:
    driver: bridge
